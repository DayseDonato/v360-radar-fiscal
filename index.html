<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V360 · Assistente de Dados (SQL)</title>
<script src="https://cdn.jsdelivr.net/npm/sql.js@1.14.1/dist/sql-wasm.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  :root {
    --bg: #12151b; --bg-elevated: #1a1e26; --panel-border: #2a2f3a;
    --paper: #ece5d2; --text: #e7e9ee; --muted: #8b93a6;
    --accent: #4fa3ad; --accent-soft: rgba(79, 163, 173, 0.16);
    --green: #4c8a5e; --red: #b6503f; --amber: #c98a2c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0a0c10; font-family: 'IBM Plex Sans', -apple-system, sans-serif; padding: 20px;
  }
  .mono { font-family: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace; }
  .app {
    background: var(--bg); color: var(--text); border-radius: 16px;
    max-width: 660px; width: 100%; border: 1px solid var(--panel-border); overflow: hidden;
  }
  .cheader { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--panel-border); background: linear-gradient(180deg, var(--bg-elevated), var(--bg)); flex-wrap: wrap; gap: 10px; }
  .cbrand { display: flex; align-items: center; gap: 11px; }
  .cmark { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 12px; border: 1.5px solid var(--accent); color: var(--accent); padding: 5px 8px; border-radius: 6px; }
  .ctitle { font-size: 14px; font-weight: 600; }
  .csub { font-size: 11.5px; color: var(--muted); margin-top: 1px; }

  .ministrip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px 16px; background: var(--bg-elevated); border-bottom: 1px solid var(--panel-border); }
  .minicard { background: var(--paper); border-radius: 8px; padding: 8px 6px; text-align: center; }
  .minival { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 15px; color: #24291f; }
  .minilabel { font-size: 9.5px; color: #55584c; text-transform: uppercase; letter-spacing: 0.3px; margin-top: 2px; }

  .keybar { padding: 12px 16px; background: var(--bg-elevated); border-bottom: 1px solid var(--panel-border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .keybar input { flex: 1; min-width: 180px; background: var(--bg); color: var(--text); border: 1px solid var(--panel-border); border-radius: 8px; padding: 8px 10px; font-size: 12.5px; font-family: 'IBM Plex Mono', monospace; }
  .keybar button { background: var(--accent); color: #0d1116; border: none; border-radius: 8px; padding: 8px 12px; font-size: 12.5px; font-weight: 600; cursor: pointer; }
  .keynote { font-size: 10.5px; color: var(--muted); width: 100%; }
  .keystatus { font-size: 11px; color: var(--green); }

  .chat-layout { display: flex; flex-direction: column; height: 480px; }
  .chat-window { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { display: flex; gap: 9px; max-width: 88%; }
  .msg-user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--bg-elevated); border: 1px solid var(--panel-border); color: var(--accent); font-size: 12px; }
  .msg-user .msg-avatar { color: var(--paper); background: #2a3038; }
  .msg-bubble { font-size: 13.5px; line-height: 1.5; padding: 10px 13px; border-radius: 10px; background: var(--bg-elevated); border: 1px solid var(--panel-border); white-space: pre-wrap; }
  .msg-user .msg-bubble { background: #23384030; border-color: var(--accent); }
  .sql-caption { font-size: 10.5px; color: var(--accent); font-family: 'IBM Plex Mono', monospace; padding: 6px 10px; background: rgba(79,163,173,0.08); border: 1px dashed var(--panel-border); border-radius: 6px; margin-top: 6px; white-space: pre-wrap; word-break: break-all; }
  .typing span { animation: tb 1.1s infinite; }
  @keyframes tb { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

  .chip-row { display: flex; gap: 7px; flex-wrap: wrap; padding: 0 16px 12px; }
  .chip { font-size: 11.5px; color: var(--accent); background: var(--accent-soft); border: 1px solid transparent; padding: 6px 10px; border-radius: 999px; cursor: pointer; }
  .chip:hover { border-color: var(--accent); }

  .chat-input-row { display: flex; gap: 8px; padding: 14px 16px; border-top: 1px solid var(--panel-border); background: var(--bg-elevated); }
  .chat-input { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--panel-border); border-radius: 8px; padding: 10px 12px; font-size: 13.5px; font-family: 'IBM Plex Sans', sans-serif; }
  .send-btn { background: var(--accent); color: #0d1116; border: none; border-radius: 8px; width: 40px; cursor: pointer; flex-shrink: 0; }
  .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
</style>
</head>
<body>
<div class="app">
  <div class="cheader">
    <div class="cbrand">
      <span class="cmark">V360</span>
      <div>
        <div class="ctitle">Assistente de Dados</div>
        <div class="csub">Radar Fiscal · consultas SQL em tempo real</div>
      </div>
    </div>
  </div>

  <div class="ministrip" id="ministrip"></div>

  <div class="keybar">
    <input type="password" id="apiKeyInput" placeholder="Cole sua chave da API da Groq (gratuita, console.groq.com)" />
    <button id="saveKeyBtn">Salvar</button>
    <span class="keynote" id="keyStatus">A chave fica só no seu navegador (localStorage), nunca é enviada a lugar nenhum além da API da Groq.</span>
  </div>

  <div class="chat-layout">
    <div class="chat-window" id="chatWindow"></div>
    <div class="chip-row" id="chipRow"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="Pergunte algo sobre as notas fiscais…" />
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
</div>

function formatBRL(v) {
  if (v == null || Number.isNaN(v)) return "—";
  return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL", maximumFractionDigits: 0 }).format(v);
}

let db = null;

async function initDb() {
  const SQL = await initSqlJs({ locateFile: f => `https://cdn.jsdelivr.net/npm/sql.js@1.14.1/dist/${f}` });
  db = new SQL.Database();
  db.run(`
    CREATE TABLE notas (
      id TEXT, unidade TEXT, data TEXT, valor_erp REAL, valor_nf REAL,
      diferenca REAL, status TEXT, tipo_divergencia TEXT, dias_atraso INTEGER, valor_risco REAL
    );
  `);
  const stmt = db.prepare(`INSERT INTO notas VALUES (?,?,?,?,?,?,?,?,?,?)`);
  RECORDS.forEach(r => {
    stmt.run([r.id, r.un, r.data, r.vErp, r.vNf, r.dif, r.st, r.tipo, r.atraso || 0, r.risco || 0]);
  });
  stmt.free();

  // Preenche a faixa de mini-KPIs com consultas SQL reais
  const total = queryOne(`SELECT COUNT(*) AS n FROM notas`).n;
  const conc = queryOne(`SELECT COUNT(*) AS n FROM notas WHERE status='Conciliado'`).n;
  const div = queryOne(`SELECT COUNT(*) AS n FROM notas WHERE status='Divergente'`).n;
  const risco = queryOne(`SELECT COALESCE(SUM(valor_risco),0) AS v FROM notas WHERE status='Divergente'`).v;
  const taxa = total ? (conc / total * 100) : 0;

  document.getElementById('ministrip').innerHTML = `
    <div class="minicard"><div class="minival">${total}</div><div class="minilabel">Notas</div></div>
    <div class="minicard"><div class="minival">${taxa.toFixed(1)}%</div><div class="minilabel">Conciliação</div></div>
    <div class="minicard"><div class="minival" style="font-size:12.5px">${formatBRL(risco)}</div><div class="minilabel">Em risco</div></div>
    <div class="minicard"><div class="minival">${div}</div><div class="minilabel">Divergentes</div></div>
  `;
}

function queryOne(sql) {
  const res = db.exec(sql);
  if (!res.length) return {};
  const { columns, values } = res[0];
  return Object.fromEntries(columns.map((c, i) => [c, values[0][i]]));
}

function runSqlQuery(query) {
  try {
    const clean = query.trim().replace(/;+\s*$/, '');
    if (!/^select/i.test(clean)) {
      return JSON.stringify({ error: "Só são permitidas consultas SELECT." });
    }
    const res = db.exec(clean);
    if (!res.length) return JSON.stringify({ columns: [], rows: [] });
    const { columns, values } = res[0];
    const rows = values.slice(0, 200).map(v => Object.fromEntries(columns.map((c, i) => [c, v[i]])));
    return JSON.stringify({ columns, rows });
  } catch (e) {
    return JSON.stringify({ error: e.message });
  }
}

  }
}];

const SYSTEM_PROMPT = "Você é o assistente de dados do painel V360 · Radar Fiscal, uma ferramenta de monitoramento de integração de notas fiscais entre o ERP e o sistema fiscal de uma empresa de saneamento. Você tem acesso a uma ferramenta chamada run_sql_query que consulta o banco de dados real com as notas dos últimos 30 dias. SEMPRE use essa ferramenta para obter números antes de responder — nunca invente ou estime valores de cabeça, e nunca deduza uma lógica própria quando já existe uma coluna que representa exatamente o que foi perguntado. Responda em português, de forma direta e objetiva.\n\nCOMO A TABELA REPRESENTA CADA CONCEITO (use sempre estes critérios, não invente outra lógica):\n- Cada linha da tabela notas já é uma nota única (a coluna id nunca se repete) — não existem duas linhas para a mesma nota.\n- Nota duplicada (cobrança em dobro) = linhas onde tipo_divergencia = 'Nota duplicada'. NÃO tente achar isso agrupando por id.\n- Nota faltante na origem = linhas onde tipo_divergencia = 'Nota faltante na origem'.\n- Valor divergente = linhas onde tipo_divergencia = 'Valor divergente'.\n- Atraso na carga = linhas onde tipo_divergencia = 'Atraso na carga' (dias em dias_atraso).\n- notas Divergente representam risco financeiro; Pendente aguardam conciliação (sem valor_nf ainda); Conciliado está tudo certo.\n- Para 'valor em risco', SEMPRE some a coluna valor_risco (nunca a diferenca diretamente) — diferenca pode ser negativa em notas do tipo Valor divergente, e somar direto pode cancelar valores e dar um total errado.\n- Para média/soma de dias_atraso, SEMPRE filtre por dias_atraso > 0 (ou tipo_divergencia = 'Atraso na carga'). A coluna vem 0 para quase todas as notas, então calcular sobre a tabela toda sem filtrar dilui o resultado e sai bem menor que a realidade.\n- Nas notas com tipo_divergencia = 'Nota faltante na origem', valor_erp = 0 significa 'não existe registro correspondente na origem', não um valor real zero. Exclua esses casos (ou trate com cuidado) ao calcular médias/somas de valor_erp.\n- IMPORTANTE — empates: sempre que a pergunta for do tipo 'qual é a maior/menor/mais frequente' (unidade com mais divergências, tipo de divergência mais comum, etc.), NUNCA use apenas ORDER BY ... LIMIT 1, pois isso esconde empates. Primeiro descubra o valor máximo (ou mínimo), depois busque TODAS as categorias que atingem esse valor, e mencione todas elas na resposta caso haja mais de uma empatada.";

// ---------- API key handling ----------
const apiKeyInput = document.getElementById('apiKeyInput');
const keyStatus = document.getElementById('keyStatus');
const keybarEl = document.querySelector('.keybar');
let apiKey = EMBEDDED_API_KEY || localStorage.getItem('v360_groq_key') || '';

if (EMBEDDED_API_KEY) {
  keybarEl.style.display = 'none';
} else if (apiKey) {
  apiKeyInput.value = apiKey;
  keyStatus.textContent = 'Chave carregada deste navegador.';
  keyStatus.className = 'keystatus';
}

document.getElementById('saveKeyBtn').addEventListener('click', () => {
  apiKey = apiKeyInput.value.trim();
  if (apiKey) {
    localStorage.setItem('v360_groq_key', apiKey);
    keyStatus.textContent = 'Chave salva neste navegador.';
    keyStatus.className = 'keystatus';
  }
});

// ---------- chat ----------
const chatWindow = document.getElementById('chatWindow');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const chipRow = document.getElementById('chipRow');

let uiMessages = [];
let conversation = []; // só pares user/assistant finais, sem detalhes de tool calls
let loading = false;

function addUiMessage(role, content, sqlUsed) {
  uiMessages.push({ role, content, sqlUsed });
  renderMessages();
}

function renderMessages() {
  chatWindow.innerHTML = uiMessages.map(m => `
    <div class="msg ${m.role === 'user' ? 'msg-user' : ''}">
      <div class="msg-avatar">${m.role === 'user' ? '🧑' : '🤖'}</div>
      <div>
        <div class="msg-bubble">${m.content.replace(/</g,'&lt;')}</div>
        ${m.sqlUsed ? `<div class="sql-caption">SQL: ${m.sqlUsed.replace(/</g,'&lt;')}</div>` : ''}
      </div>
    </div>
  `).join('') + (loading ? `
    <div class="msg"><div class="msg-avatar">🤖</div><div class="msg-bubble"><span class="typing">···</span></div></div>
  ` : '');
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

const quickQuestions = [
  "Qual unidade tem mais divergências?",
  "Qual o valor total em risco agora?",
  "Tem alguma nota duplicada recente?",
  "Quantas notas estão pendentes?",
];
chipRow.innerHTML = quickQuestions.map(q => `<button class="chip" data-q="${q}">${q}</button>`).join('');
chipRow.querySelectorAll('.chip').forEach(btn => btn.addEventListener('click', () => sendMessage(btn.dataset.q)));

async function callGroq(messagesForApi) {
  const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: 'openai/gpt-oss-20b',
      messages: messagesForApi,
      tools: TOOLS,
      tool_choice: 'auto',
    }),
  });
  if (!response.ok) {
    const t = await response.text();
    throw new Error(t);
  }
  return response.json();
}

async function sendMessage(text) {
  const trimmed = (text || chatInput.value).trim();
  if (!trimmed || loading) return;
  if (!apiKey) {
    addUiMessage('assistant', 'Antes de perguntar, cole sua chave gratuita da Groq no campo acima e clique em Salvar. Você pode gerar uma em console.groq.com.');
    return;
  }

  addUiMessage('user', trimmed);
  chatInput.value = '';
  loading = true;
  renderMessages();

  try {
    let apiMessages = [
      { role: 'system', content: SYSTEM_PROMPT },
      ...conversation.slice(-6),
      { role: 'user', content: trimmed },
    ];

    let finalAnswer = null;
    let lastSql = null;

    for (let round = 0; round < 4 && finalAnswer === null; round++) {
      const data = await callGroq(apiMessages);
      const msg = data.choices[0].message;

      if (msg.tool_calls && msg.tool_calls.length) {
        apiMessages.push(msg);
        for (const tc of msg.tool_calls) {
          let args = {};
          try { args = JSON.parse(tc.function.arguments); } catch (e) {}
          lastSql = args.query || lastSql;
          const result = runSqlQuery(args.query || '');
          apiMessages.push({ role: 'tool', tool_call_id: tc.id, content: result });
        }
      } else {
        finalAnswer = msg.content || 'Não consegui gerar uma resposta agora.';
      }
    }

    loading = false;
    addUiMessage('assistant', finalAnswer || 'Não consegui gerar uma resposta agora.', lastSql);
    conversation.push({ role: 'user', content: trimmed });
    conversation.push({ role: 'assistant', content: finalAnswer || '' });
  } catch (err) {
    loading = false;
    addUiMessage('assistant', 'Tive um problema para consultar os dados (confira se a chave da API está correta). Detalhe técnico: ' + err.message.slice(0, 200));
  }
}

sendBtn.addEventListener('click', () => sendMessage());
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

addUiMessage('assistant', EMBEDDED_API_KEY
  ? 'Oi! Sou o assistente de dados do V360. Pergunte algo sobre as notas fiscais — eu consulto o banco de dados real (SQL) antes de responder.'
  : 'Oi! Sou o assistente de dados do V360. Cole sua chave gratuita da Groq acima e pergunte algo — eu consulto o banco de dados real (SQL) antes de responder.');

initDb().catch(e => addUiMessage('assistant', 'Erro ao carregar o banco de dados: ' + e.message));
</script>
