<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V360 · Assistente de Dados</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  :root {
    --bg: #12151b; --bg-elevated: #1a1e26; --panel-border: #2a2f3a;
    --paper: #ece5d2; --text: #e7e9ee; --muted: #8b93a6;
    --accent: #4fa3ad; --accent-soft: rgba(79, 163, 173, 0.16);
    --green: #4c8a5e; --red: #b6503f; --amber: #c98a2c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0a0c10; font-family: 'IBM Plex Sans', -apple-system, sans-serif; padding: 20px;
  }
  .mono { font-family: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace; }
  .app {
    background: var(--bg); color: var(--text); border-radius: 16px;
    max-width: 640px; width: 100%; border: 1px solid var(--panel-border); overflow: hidden;
  }
  .cheader { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--panel-border); background: linear-gradient(180deg, var(--bg-elevated), var(--bg)); flex-wrap: wrap; gap: 10px; }
  .cbrand { display: flex; align-items: center; gap: 11px; }
  .cmark { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 12px; border: 1.5px solid var(--accent); color: var(--accent); padding: 5px 8px; border-radius: 6px; }
  .ctitle { font-size: 14px; font-weight: 600; }
  .csub { font-size: 11.5px; color: var(--muted); margin-top: 1px; }

  .ministrip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px 16px; background: var(--bg-elevated); border-bottom: 1px solid var(--panel-border); }
  .minicard { background: var(--paper); border-radius: 8px; padding: 8px 6px; text-align: center; }
  .minival { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 15px; color: #24291f; }
  .minilabel { font-size: 9.5px; color: #55584c; text-transform: uppercase; letter-spacing: 0.3px; margin-top: 2px; }

  .keybar { padding: 12px 16px; background: var(--bg-elevated); border-bottom: 1px solid var(--panel-border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .keybar input { flex: 1; min-width: 180px; background: var(--bg); color: var(--text); border: 1px solid var(--panel-border); border-radius: 8px; padding: 8px 10px; font-size: 12.5px; font-family: 'IBM Plex Mono', monospace; }
  .keybar button { background: var(--accent); color: #0d1116; border: none; border-radius: 8px; padding: 8px 12px; font-size: 12.5px; font-weight: 600; cursor: pointer; }
  .keynote { font-size: 10.5px; color: var(--muted); width: 100%; }
  .keystatus { font-size: 11px; color: var(--green); }

  .chat-layout { display: flex; flex-direction: column; height: 480px; }
  .chat-window { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { display: flex; gap: 9px; max-width: 85%; }
  .msg-user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--bg-elevated); border: 1px solid var(--panel-border); color: var(--accent); font-size: 12px; }
  .msg-user .msg-avatar { color: var(--paper); background: #2a3038; }
  .msg-bubble { font-size: 13.5px; line-height: 1.5; padding: 10px 13px; border-radius: 10px; background: var(--bg-elevated); border: 1px solid var(--panel-border); white-space: pre-wrap; }
  .msg-user .msg-bubble { background: #23384030; border-color: var(--accent); }
  .typing span { animation: tb 1.1s infinite; }
  @keyframes tb { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

  .chip-row { display: flex; gap: 7px; flex-wrap: wrap; padding: 0 16px 12px; }
  .chip { font-size: 11.5px; color: var(--accent); background: var(--accent-soft); border: 1px solid transparent; padding: 6px 10px; border-radius: 999px; cursor: pointer; }
  .chip:hover { border-color: var(--accent); }

  .chat-input-row { display: flex; gap: 8px; padding: 14px 16px; border-top: 1px solid var(--panel-border); background: var(--bg-elevated); }
  .chat-input { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--panel-border); border-radius: 8px; padding: 10px 12px; font-size: 13.5px; font-family: 'IBM Plex Sans', sans-serif; }
  .send-btn { background: var(--accent); color: #0d1116; border: none; border-radius: 8px; width: 40px; cursor: pointer; flex-shrink: 0; }
  .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
</style>
</head>
<body>
<div class="app">
  <div class="cheader">
    <div class="cbrand">
      <span class="cmark">V360</span>
      <div>
        <div class="ctitle">Assistente de Dados</div>
        <div class="csub">Radar Fiscal · dados reais da planilha</div>
      </div>
    </div>
  </div>

  <div class="ministrip" id="ministrip"></div>

  <div class="keybar">
    <input type="password" id="apiKeyInput" placeholder="Cole sua chave da API do Gemini (gratuita, ai.google.dev)" />
    <button id="saveKeyBtn">Salvar</button>
    <span class="keynote" id="keyStatus">A chave fica só no seu navegador (localStorage), nunca é enviada a lugar nenhum além da API do Google.</span>
  </div>

  <div class="chat-layout">
    <div class="chat-window" id="chatWindow"></div>
    <div class="chip-row" id="chipRow"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="Pergunte algo sobre as notas fiscais…" />
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
</div>

// Deixando preenchida, o chat funciona sozinho pra quem abrir o link.
const EMBEDDED_API_KEY = "";

function formatBRL(v) {
  if (v == null || Number.isNaN(v)) return "—";
  return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL", maximumFractionDigits: 0 }).format(v);
}

const total = RECORDS.length;
const conciliadas = RECORDS.filter(r => r.st === "Conciliado");
const divergentes = RECORDS.filter(r => r.st === "Divergente");
const pendentes = RECORDS.filter(r => r.st === "Pendente");
const taxaConciliacao = total ? (conciliadas.length / total) * 100 : 0;
const valorEmRisco = RECORDS.reduce((s, r) => s + (r.risco || 0), 0);

const porUnidade = {};
UNIDADES.forEach(u => porUnidade[u] = 0);
divergentes.forEach(r => porUnidade[r.un] = (porUnidade[r.un] || 0) + 1);

const porTipo = {};
divergentes.forEach(r => porTipo[r.tipo] = (porTipo[r.tipo] || 0) + 1);

  <div class="minicard"><div class="minival">${total}</div><div class="minilabel">Notas</div></div>
  <div class="minicard"><div class="minival">${taxaConciliacao.toFixed(1)}%</div><div class="minilabel">Conciliação</div></div>
  <div class="minicard"><div class="minival" style="font-size:12.5px">${formatBRL(valorEmRisco)}</div><div class="minilabel">Em risco</div></div>
  <div class="minicard"><div class="minival">${divergentes.length}</div><div class="minilabel">Divergentes</div></div>
`;

const resumo = {
  totalNotas: total,
  taxaConciliacaoPct: Number(taxaConciliacao.toFixed(1)),
  valorEmRiscoBRL: Math.round(valorEmRisco),
  divergenciasAbertas: divergentes.length,
  pendentes: pendentes.length,
  divergenciasPorUnidade: porUnidade,
  divergenciasPorTipo: porTipo,

};

  "Você é o assistente de dados do painel V360 · Radar Fiscal, uma ferramenta de monitoramento de integração de notas fiscais entre o ERP e o sistema fiscal de uma empresa de saneamento. " +
  "Responda em português, de forma direta e objetiva, citando números quando fizer sentido, sempre com base nos dados abaixo. " +
  "Nunca invente números que não estejam nos dados. Se a pergunta não puder ser respondida com o que foi fornecido, diga isso claramente. " +
  "Contexto: notas 'Divergente' representam risco financeiro e devem ser investigadas; 'Pendente' aguardam conciliação; 'Conciliado' está tudo certo.\n\n" +
  "RESUMO AGREGADO:\n" + JSON.stringify(resumo) +
  "\n\nREGISTROS DETALHADOS (id, unidade, data, valorErp, valorNF, diferenca, status, tipoDivergencia, diasAtraso, valorEmRisco):\n" +
  JSON.stringify(RECORDS);

// ---------- API key handling ----------
const apiKeyInput = document.getElementById('apiKeyInput');
const keyStatus = document.getElementById('keyStatus');
const keybarEl = document.querySelector('.keybar');
let apiKey = EMBEDDED_API_KEY || localStorage.getItem('v360_gemini_key') || '';

if (EMBEDDED_API_KEY) {
  // Chave fixa embutida: esconde a barra, chat funciona sozinho
  keybarEl.style.display = 'none';
} else if (apiKey) {
  apiKeyInput.value = apiKey;
  keyStatus.textContent = 'Chave carregada deste navegador.';
  keyStatus.className = 'keystatus';
}

document.getElementById('saveKeyBtn').addEventListener('click', () => {
  apiKey = apiKeyInput.value.trim();
  if (apiKey) {
    localStorage.setItem('v360_gemini_key', apiKey);
    keyStatus.textContent = 'Chave salva neste navegador.';
    keyStatus.className = 'keystatus';
  }
});

// ---------- chat ----------
const chatWindow = document.getElementById('chatWindow');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const chipRow = document.getElementById('chipRow');

let messages = [];
let loading = false;

function addMessage(role, content) {
  messages.push({ role, content });
  renderMessages();
}

function renderMessages() {
  chatWindow.innerHTML = messages.map(m => `
    <div class="msg ${m.role === 'user' ? 'msg-user' : ''}">
      <div class="msg-avatar">${m.role === 'user' ? '🧑' : '🤖'}</div>
      <div class="msg-bubble">${m.content.replace(/</g,'&lt;')}</div>
    </div>
  `).join('') + (loading ? `
    <div class="msg"><div class="msg-avatar">🤖</div><div class="msg-bubble"><span class="typing">···</span></div></div>
  ` : '');
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

addMessage('assistant', EMBEDDED_API_KEY
  ? 'Oi! Sou o assistente de dados do V360. Pergunte algo sobre as notas fiscais dos últimos 30 dias — divergências, valores em risco, atrasos, unidades com mais problemas, e mais.'
  : 'Oi! Sou o assistente de dados do V360. Cole sua chave gratuita do Gemini acima e pergunte algo sobre as notas fiscais dos últimos 30 dias.');

const quickQuestions = [
  "Qual unidade tem mais divergências?",
  "Qual o valor total em risco agora?",
  "Tem alguma nota duplicada recente?",
  "Como está a taxa de conciliação essa semana?",
];
chipRow.innerHTML = quickQuestions.map(q => `<button class="chip" data-q="${q}">${q}</button>`).join('');
chipRow.querySelectorAll('.chip').forEach(btn => btn.addEventListener('click', () => sendMessage(btn.dataset.q)));

async function sendMessage(text) {
  const trimmed = (text || chatInput.value).trim();
  if (!trimmed || loading) return;
  if (!apiKey) {
    addMessage('assistant', 'Antes de perguntar, cole sua chave gratuita do Gemini no campo acima e clique em Salvar. Você pode gerar uma em ai.google.dev.');
    return;
  }

  addMessage('user', trimmed);
  chatInput.value = '';
  loading = true;
  renderMessages();

  try {
    const contents = messages
      .filter(m => m.role === 'user' || m.role === 'model_reply')
      .map(m => ({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.content }] }));

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
        body: JSON.stringify({
          systemInstruction: { parts: [{ text: systemPrompt }] },
          contents: contents,
        }),
      }
    );

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(errText);
    }
    const data = await response.json();
    const textOut = data.candidates?.[0]?.content?.parts?.map(p => p.text).join('\n') || 'Não consegui gerar uma resposta agora.';
    loading = false;
    addMessage('model_reply', textOut);
  } catch (err) {
    loading = false;
    addMessage('assistant', 'Tive um problema para consultar os dados (confira se a chave da API está correta). Detalhe técnico: ' + err.message.slice(0, 200));
  }
}

sendBtn.addEventListener('click', () => sendMessage());
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
